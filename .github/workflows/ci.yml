name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.13.1
      # Node 22.13 ships an older Corepack keyring that cannot verify the
      # repository-pinned pnpm release. Install the pinned, current Corepack
      # before any pnpm command, including always-run cleanup steps.
      - name: Activate the pinned pnpm toolchain
        run: |
          npm install --global corepack@0.31.0
          corepack enable
          corepack prepare pnpm@11.12.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Check dependencies
        run: pnpm deps:check
      - name: Type check
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Start integration PostgreSQL
        run: pnpm db:test:up
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://caseweaver:caseweaver@localhost:54329/caseweaver_test
          PG_BOSS_INTEGRATION: "1"
        run: pnpm test:integration
      - name: Stop integration PostgreSQL
        if: always()
        run: pnpm db:test:down
