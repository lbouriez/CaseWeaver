name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Check dependencies
        run: pnpm deps:check
      - name: Type check
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Start integration PostgreSQL
        run: pnpm db:test:up
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://caseweaver:caseweaver@localhost:54329/caseweaver_test
          PG_BOSS_INTEGRATION: "1"
        run: pnpm test:integration
      - name: Stop integration PostgreSQL
        if: always()
        run: pnpm db:test:down
