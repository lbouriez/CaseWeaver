name: Documentation portal

on:
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/docs-pages.yml"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify documentation portal
    runs-on: ubuntu-latest
    outputs:
      preview_configured: ${{ steps.site_url.outputs.preview_configured }}
      production_configured: ${{ steps.site_url.outputs.production_configured }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1
        with:
          version: 11.12.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install documentation dependencies
        run: pnpm --dir website install --frozen-lockfile
      - name: Resolve documentation site URL
        id: site_url
        shell: bash
        env:
          CASEWEAVER_DOCS_SITE_URL: ${{ vars.CASEWEAVER_DOCS_SITE_URL || secrets.CASEWEAVER_DOCS_SITE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -n "$PR_NUMBER" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_PAGES_PROJECT" ]; then
              echo "CASEWEAVER_DOCS_SITE_URL=https://pr-${PR_NUMBER}.${CLOUDFLARE_PAGES_PROJECT}.pages.dev" >> "$GITHUB_ENV"
              echo "preview_configured=true" >> "$GITHUB_OUTPUT"
            else
              echo "CASEWEAVER_DOCS_SITE_URL=https://docs.caseweaver.local" >> "$GITHUB_ENV"
              echo "preview_configured=false" >> "$GITHUB_OUTPUT"
              echo "Cloudflare preview is not configured; running verification only."
            fi
            echo "production_configured=false" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$CASEWEAVER_DOCS_SITE_URL" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_PAGES_PROJECT" ]; then
              case "$CASEWEAVER_DOCS_SITE_URL" in
                https://*) ;;
                *) echo "CASEWEAVER_DOCS_SITE_URL must be an HTTPS origin." >&2; exit 1 ;;
              esac
              echo "CASEWEAVER_DOCS_SITE_URL=$CASEWEAVER_DOCS_SITE_URL" >> "$GITHUB_ENV"
              echo "production_configured=true" >> "$GITHUB_OUTPUT"
            else
              echo "CASEWEAVER_DOCS_SITE_URL=https://docs.caseweaver.local" >> "$GITHUB_ENV"
              echo "production_configured=false" >> "$GITHUB_OUTPUT"
              echo "Cloudflare production is not configured; running verification only."
            fi
            echo "preview_configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Type check documentation portal
        run: pnpm --dir website typecheck
      - name: Test documentation portal
        run: pnpm --dir website test
      - name: Build documentation portal
        run: pnpm --dir website build
      - name: Upload documentation artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          if-no-files-found: error
          name: caseweaver-documentation-${{ github.sha }}
          path: website/build
          retention-days: 7

  publish-production:
    name: Publish documentation portal
    if: |
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')) &&
      needs.verify.outputs.production_configured == 'true'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages-production
    concurrency:
      group: cloudflare-pages-production
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Download verified documentation artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: caseweaver-documentation-${{ github.sha }}
          path: website/build
      - name: Validate production publishing configuration
        env:
          CASEWEAVER_DOCS_SITE_URL: ${{ vars.CASEWEAVER_DOCS_SITE_URL || secrets.CASEWEAVER_DOCS_SITE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          for variable in CASEWEAVER_DOCS_SITE_URL CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!variable}" ]; then
              echo "Missing required protected-environment configuration: ${variable}" >&2
              exit 1
            fi
          done
          case "$CASEWEAVER_DOCS_SITE_URL" in
            https://*) ;;
            *) echo "CASEWEAVER_DOCS_SITE_URL must be an HTTPS origin." >&2; exit 1 ;;
          esac
      - name: Deploy verified site to Cloudflare Pages
        id: publish
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=main
          gitHubToken: ${{ github.token }}
          packageManager: npm
          wranglerVersion: 4.111.0
      - name: Record deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.publish.outputs.deployment-url }}
        run: |
          printf '### Documentation deployment\n\n%s\n' "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

  publish-preview:
    name: Publish documentation preview
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.verify.outputs.preview_configured == 'true'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages-preview
    concurrency:
      group: cloudflare-pages-preview
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Download verified documentation artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: caseweaver-documentation-${{ github.sha }}
          path: website/build
      - name: Validate preview publishing configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          for variable in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_PAGES_PROJECT PR_NUMBER; do
            if [ -z "${!variable}" ]; then
              echo "Missing required preview configuration: ${variable}" >&2
              exit 1
            fi
          done
          PREVIEW_URL="https://pr-${PR_NUMBER}.${CLOUDFLARE_PAGES_PROJECT}.pages.dev"
          case "$PREVIEW_URL" in
            https://*) ;;
            *) echo "Preview URL must be an HTTPS origin." >&2; exit 1 ;;
          esac
      - name: Deploy verified preview to Cloudflare Pages
        id: publish
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/build --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=pr-${{ github.event.pull_request.number }}
          gitHubToken: ${{ github.token }}
          packageManager: npm
          wranglerVersion: 4.111.0
      - name: Comment PR with preview URL
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || secrets.CLOUDFLARE_PAGES_PROJECT }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://pr-${prNumber}.${process.env.CLOUDFLARE_PAGES_PROJECT}.pages.dev`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find((comment) =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Documentation Preview'),
            );

            const body = `## Documentation Preview

            | Environment | URL |
            |-------------|-----|
            | 📄 Docs | [${previewUrl}](${previewUrl}) |

            > Updated: ${new Date().toISOString()}
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
