name: caseweaver

# This file is an operator topology, not a development shortcut.  Every runtime
# image is pinned independently so an operator can select verified OCI digests.
# Choose exactly one application profile: `standalone` or `distributed`.
# `migrate` is deliberately separate and must finish before either profile starts.

x-runtime-environment: &runtime-environment
  NODE_ENV: production
  DATABASE_URL_FILE: /run/secrets/database-url
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_METRIC_EXPORT_INTERVAL_MS: ${OTEL_METRIC_EXPORT_INTERVAL_MS:-30000}
  OTEL_SERVICE_VERSION: ${CASEWEAVER_RELEASE_VERSION:-unknown}

x-runtime: &runtime
  restart: unless-stopped
  environment: *runtime-environment
  secrets:
    - database-url
  networks:
    - caseweaver-data
    - caseweaver-egress
  depends_on:
    postgres:
      condition: service_healthy
      required: true

x-api-environment: &api-environment
  HOST: "0.0.0.0"
  PORT: "3000"
  DATABASE_READINESS_TIMEOUT_MS: ${DATABASE_READINESS_TIMEOUT_MS:-5000}
  API_WORKSPACE_ID: ${API_WORKSPACE_ID:?Set API_WORKSPACE_ID.}
  API_PRINCIPAL_ID: ${API_PRINCIPAL_ID:?Set API_PRINCIPAL_ID.}
  ADMIN_ALLOWED_ORIGINS: ${ADMIN_ALLOWED_ORIGINS:?Set the HTTPS admin UI origin.}
  # Password authentication is off by default in production.  Set this to true
  # and provide non-default ADMIN_LOGIN/ADMIN_PASSWORD only for an explicitly
  # accepted break-glass/local deployment; otherwise configure OIDC below.
  ADMIN_DISABLE_LOGIN_AUTHENTICATION: ${ADMIN_DISABLE_LOGIN_AUTHENTICATION:-true}
  ADMIN_ENABLE_PASSWORD_AUTHENTICATION: ${ADMIN_ENABLE_PASSWORD_AUTHENTICATION:-false}
  ADMIN_LOGIN:
  ADMIN_PASSWORD:
  OIDC_ISSUER:
  OIDC_CLIENT_ID:
  OIDC_CLIENT_SECRET:
  OIDC_CALLBACK_URL:
  OIDC_EPHEMERAL_ENCRYPTION_KEY:
  OIDC_EPHEMERAL_KEY_ID:
  ADMIN_BOOTSTRAP_OIDC_SUBJECT:
  ADMIN_BOOTSTRAP_DISPLAY_NAME:
  TRUSTED_PROXY_CIDRS:

x-worker-environment: &worker-environment
  # Object storage, provider and connector configuration are deployment-owned.
  # The image has neither a credential nor a fallback secret; unset values fail
  # closed when the relevant workload is selected.
  OBJECT_STORAGE_KIND:
  OBJECT_STORAGE_BACKEND_ID:
  OBJECT_STORAGE_KEY_DERIVATION_SECRET:
  OBJECT_STORAGE_LOCAL_ROOT:
  OBJECT_STORAGE_S3_ENDPOINT:
  OBJECT_STORAGE_S3_REGION:
  OBJECT_STORAGE_S3_BUCKET:
  OBJECT_STORAGE_S3_ACCESS_KEY_ID:
  OBJECT_STORAGE_S3_SECRET_ACCESS_KEY:
  WORKER_GIT_TEMPORARY_DIRECTORY: ${WORKER_GIT_TEMPORARY_DIRECTORY:-/tmp/caseweaver-git}
  WORKER_GIT_REMOTE_CACHE_DIRECTORY: ${WORKER_GIT_REMOTE_CACHE_DIRECTORY:-/tmp/caseweaver-git-cache}

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-caseweaver}
      POSTGRES_USER: ${POSTGRES_USER:-caseweaver}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" &&
          psql -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1
          -c "SELECT 1 / COUNT(*) FROM pg_extension WHERE extname = 'vector';"
          > /dev/null
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    secrets:
      - postgres-password
    volumes:
      - caseweaver_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - caseweaver-data

  migrate:
    image: ${CASEWEAVER_MIGRATION_IMAGE:?Set CASEWEAVER_MIGRATION_IMAGE to a pinned migration image.}
    profiles: ["migrate"]
    restart: "no"
    environment:
      <<: *runtime-environment
      OTEL_SDK_DISABLED: "true"
    secrets:
      - database-url
    networks:
      - caseweaver-data
    depends_on:
      postgres:
        condition: service_healthy
        required: true

  standalone:
    <<: *runtime
    image: ${CASEWEAVER_STANDALONE_IMAGE:?Set CASEWEAVER_STANDALONE_IMAGE to a pinned standalone image.}
    profiles: ["standalone"]
    environment:
      <<: [*runtime-environment, *api-environment, *worker-environment]
      OTEL_SERVICE_NAME: caseweaver-standalone
    ports:
      - "127.0.0.1:${CASEWEAVER_STANDALONE_PORT:-8080}:3000"

  api:
    <<: *runtime
    image: ${CASEWEAVER_API_IMAGE:?Set CASEWEAVER_API_IMAGE to a pinned API image.}
    profiles: ["distributed"]
    environment:
      <<: [*runtime-environment, *api-environment]
      OTEL_SERVICE_NAME: caseweaver-api
    ports:
      - "127.0.0.1:${CASEWEAVER_API_PORT:-8080}:3000"

  webhook:
    <<: *runtime
    image: ${CASEWEAVER_WEBHOOK_IMAGE:?Set CASEWEAVER_WEBHOOK_IMAGE to a pinned webhook image.}
    profiles: ["distributed"]
    environment:
      <<: *runtime-environment
      OTEL_SERVICE_NAME: caseweaver-webhook
      WEBHOOK_HOST: "0.0.0.0"
      WEBHOOK_PORT: "8081"
    ports:
      - "127.0.0.1:${CASEWEAVER_WEBHOOK_PORT:-8081}:8081"

  scheduler:
    <<: *runtime
    image: ${CASEWEAVER_SCHEDULER_IMAGE:?Set CASEWEAVER_SCHEDULER_IMAGE to a pinned scheduler image.}
    profiles: ["distributed"]
    environment:
      <<: *runtime-environment
      OTEL_SERVICE_NAME: caseweaver-scheduler

  worker:
    <<: *runtime
    image: ${CASEWEAVER_WORKER_IMAGE:?Set CASEWEAVER_WORKER_IMAGE to a pinned worker image.}
    profiles: ["distributed"]
    environment:
      <<: [*runtime-environment, *worker-environment]
      OTEL_SERVICE_NAME: caseweaver-worker

secrets:
  database-url:
    file: ${CASEWEAVER_DATABASE_URL_FILE:?Set CASEWEAVER_DATABASE_URL_FILE to a DATABASE_URL secret file.}
  postgres-password:
    file: ${CASEWEAVER_POSTGRES_PASSWORD_FILE:?Set CASEWEAVER_POSTGRES_PASSWORD_FILE to a PostgreSQL password secret file.}

volumes:
  caseweaver_postgres_data:

networks:
  caseweaver-data:
    internal: true
  caseweaver-egress:
