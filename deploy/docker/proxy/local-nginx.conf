server {
    listen 8080;
    server_name _;

    # Docker can assign a replacement container a new address after a normal
    # API/webhook restart. Resolve service names at request time so the one
    # local edge does not retain a dead upstream address for its lifetime.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream api:3000;
    set $webhook_upstream webhook:8081;
    set $admin_upstream admin:8080;

    # This is a local convenience proxy, not a production TLS or identity boundary.
    # It deliberately forwards ordinary transport headers only; authentication is
    # resolved from API-managed cookies and validated OIDC sessions.
    location /v1/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /health/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Opaque connector webhook IDs are public ingress, but endpoint resolution,
    # signature verification, rate admission, inbox/outbox persistence, and all
    # connector secrets remain in the isolated webhook service.
    location /webhooks/ {
        proxy_pass http://$webhook_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
